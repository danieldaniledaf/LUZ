<style>
    /* FONDO DIMANICO*/
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: fondo-dinamico 6s ease infinite;
}
@keyframes fondo-dinamico {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
}

/* Carta - Centro*/
body1 {
    display: flex;
    justify-content: center;
    align-items: center;
}
/* Carta - Sobre */
.carta{
    position:relative;
    width:300px;
    height:200px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    overflow:hidden;
}
/* Carta - Tapa del sobre */
.tapa{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff6b6b;
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: transform 0.8s ease;
}
/* Carta - Papel */
.papel{
    position:absolute;
    width:90%;
    height:90%;
    background:white;
    top:5%;
    left:5%;
    border-radius:5px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    transform: translateY(100%);
    transition: transform 0.8s ease;
}
/* Carta - Animación */
.carta:hover .tapa{
    transform: rotateX(180deg);
}
.carta:hover .papel{
    transform: translateY(0);
}

/*CORAZON*/


/* Botón corazón */
.corazon{
    position:relative;
    width:60px;
    height:60px;
    background:#ff2e63;
    transform:rotate(-45deg);
    border:none;
    cursor:pointer;
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    animation:latido 1.5s infinite;
}

/* Círculos superiores */
.corazon::before,
.corazon::after{
    content:"";
    position:absolute;
    width:60px;
    height:60px;
    background:#ff2e63;
    border-radius:50%;
}

.corazon::before{
    top:-30px;
    left:0;
}

.corazon::after{
    left:30px;
    top:0;
}

/* Hover efecto */
.corazon:hover{
    transform:rotate(-45deg) scale(1.1);
}

/* Animación latido */
@keyframes latido{
    0%{ transform:rotate(-45deg) scale(1); }
    50%{ transform:rotate(-45deg) scale(1.1); }
    100%{ transform:rotate(-45deg) scale(1); }
}
html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    justify-content: center; /* centro horizontal */
    align-items: center;     /* centro vertical */
}
</style>
</head>
